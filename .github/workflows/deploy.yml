- name: Deploy to EC2
  uses: appleboy/ssh-action@master
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ubuntu
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      # Set kubeconfig (IMPORTANT)
      export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

      # Login to ECR (FIXED)
      aws ecr get-login-password --region us-east-1 \
      | sudo docker login --username AWS --password-stdin 287190273939.dkr.ecr.us-east-1.amazonaws.com

      # Update ECR secret
      sudo kubectl delete secret ecr-secret --ignore-not-found
      ECR_PASS=$(aws ecr get-login-password --region us-east-1)

      sudo kubectl create secret docker-registry ecr-secret \
        --docker-server=287190273939.dkr.ecr.us-east-1.amazonaws.com \
        --docker-username=AWS \
        --docker-password="$ECR_PASS"

      # Apply Kubernetes manifests (VERY IMPORTANT)
      sudo kubectl apply -f k8s/

      # Restart deployments safely
      sudo kubectl rollout restart deployment frontend || true
      sudo kubectl rollout restart deployment backend || true

      # Check rollout
      sudo kubectl rollout status deployment frontend
      sudo kubectl rollout status deployment backend